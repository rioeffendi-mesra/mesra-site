# Mesra Alam Sekitar — Jekyll site config
title: "Mesra Alam Sekitar Sdn Bhd | Continuous Emission Monitoring System | Malaysia"
description: "DOE iRemote-registered CEMS consultants since 2010. Mesra Alam Sekitar designs, installs, certifies (QAL 2/QAL 3) and maintains Continuous Emission Monitoring Systems for Malaysian industry — and helped write the DOE CEMS Guidelines."

# Site address.
# While previewing on the GitHub Pages project URL (rioeffendi-mesra.github.io/mesra-site),
# keep baseurl as "/mesra-site".
# WHEN YOU CONNECT A ROOT DOMAIN (e.g. new.alamsekitar.com.my), change baseurl to "" (empty).
url: "https://www.alamsekitar.com.my"
baseurl: ""

# Pin post-date interpretation to Malaysia time explicitly. Without this,
# Jekyll compares front-matter dates against whatever system timezone the
# build machine happens to be set to — which caused a same-day post to be
# silently skipped as "future dated" during local preview (2026-07-08) when
# the machine's clock wasn't reading Malaysia time. Also keeps local preview
# and the GitHub Actions build (which runs on UTC servers) consistent with
# each other.
timezone: "Asia/Kuala_Lumpur"

# Blog post URLs look like /insights/your-title/
# Scoped to posts only, so pages (blog.html, index.html) keep their normal URLs.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /insights/:title/

# Plugins.
# jekyll-sitemap auto-generates /sitemap.xml on every build (GitHub Pages
# supported, zero-config). It uses the absolute `url:` above for entries.
# NOTE: also listed in the Gemfile so local Jekyll 4.x preview matches the
# live GitHub Pages build.
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Don't publish these as pages.
exclude:
  - README.md
  - LOCAL-PREVIEW.md
  - "*.pdf"
  - "*.psd"
  - Gemfile
  - Gemfile.lock
  - vendor

# touch: trivial edit to trigger a fresh Pages deploy (2026-07-06) after run #59's
# deploy step failed twice with GitHub's own "Deployment failed, try again later."
# error — no functional change, just forcing a new artifact/deployment ID.
#
# touch 2: same "Deployment failed, try again later." error recurred on run #61
# (Part 2 push) and its re-run — 4 failures total. Pages status page checked and
# shows Normal / no active incident, so forcing one more fresh attempt rather
# than continuing to re-run the same stuck deployment.
