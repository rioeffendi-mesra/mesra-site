# Single source of truth for the Insights blog series.
# Read by post.html (stepper + prev/next), blog.html (grouped landing + filter
# chips) and default.html (nav dropdown). Add a new series by adding a block
# here and tagging posts with `series: <slug>` + `part: <n>` in their front matter.
#
# fields:
#   slug     – matches the `series:` value in post front matter + the blog.html anchor (#slug)
#   name     – display name
#   audience – short "for whom / when" label
#   total    – intended number of parts in the finished arc (for the "Part X of N" label)
#   order    – sort order of the tracks on the landing page and nav
#   nav      – show in the global-nav dropdown (foundation is excluded)

