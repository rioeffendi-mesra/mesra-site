# Single source of truth for the Insights blog series.
# Read by post.html (stepper + prev/next), blog.html (grouped landing + filter
# chips) and default.html (nav dropdown). Add a new series by adding a block
# here and tagging posts with `series: <slug>` + `part: <n>` in their front matter.
#
# fields:
#   slug     – matches the `series:` value in post front matter + the blog.html anchor (#slug)
#   name     – display name
#   audience – short "for whom / when" label
#   total    – intended number of parts in the finished arc (for the "Part X of N" label)
#   order    – sort order of the tracks on the landing page and nav
#   nav      – show in the global-nav dropdown (foundation is excluded)
#   parent   – optional. Slug of another series in this file. Nav-dropdown only:
#              this track renders indented under its parent's entry instead of
#              as its own top-level nav item, so an industry vertical (e.g.
#              palm-oil-mills) reads as a sub-track of its umbrella (e.g.
#              biomass-boilers) instead of a second, similarly named menu item.
#              blog.html is untouched by this — the track still gets its own
#              filter chip and landing-page section, in `order`.

- slug: foundation
  name: "Start here"
  audience: "the essential primer"
  total: 2
  order: 0
  nav: false

- slug: buying
  name: "Buying a CEMS"
  audience: "for industry · pre-purchase"
  total: 5
  order: 1
  nav: true

- slug: operating
  name: "Operating a compliant CEMS"
  audience: "for industry · post-install"
  total: 5
  order: 2
  nav: true

- slug: enforcing
  name: "Enforcing the Clean Air Regulations 2014"
  audience: "for regulators & compliance staff"
  total: 5
  order: 3
  nav: true

- slug: reference-methods
  name: "The reference methods behind your CEMS"
  audience: "industry + regulator crossover"
  total: 6
  order: 4
  nav: true

- slug: biomass-boilers
  name: "CEMS for biomass boilers"
  audience: "cross-industry — palm oil, timber, rubberwood, biomass power"
  total: 2
  order: 5
  nav: true

- slug: palm-oil-mills
  name: "CEMS for palm oil mills"
  audience: "for palm oil mill operators & EHS managers"
  total: 4
  order: 6
  nav: true
  parent: biomass-boilers

# Standalone posts that don't fit a fixed how-to track: standards revisions,
# platform/naming changes, anything that needs updating as the framework
# itself moves. Posts here intentionally omit `part` (no fixed length, no
# stepper) — see the `unless post.part` guard in blog.html's series-group loop.
- slug: watch
  name: "Standards & platform watch"
  audience: "for anyone tracking what's changing"
  total: 2
  order: 7
  nav: true
