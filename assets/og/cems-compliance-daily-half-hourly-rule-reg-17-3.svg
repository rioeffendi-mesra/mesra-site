<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Mesra Alam Sekitar — What 'compliant' actually means"><rect width="1200" height="630" fill="#ffffff"/><rect x="0" y="0" width="1200" height="10" fill="#2CB34A"/><text x="80" y="112" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="22" letter-spacing="4" font-weight="600" fill="#1E7D33">CEMS INSIGHTS · ENFORCING · PART 1</text><text x="80" y="192" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">What 'compliant'</text><text x="80" y="262" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">actually means</text><text x="80" y="312" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="400" fill="#3c4247">The daily-average rule and the 2× half-hourly rule — Reg 17(3).</text><rect x="80" y="440" width="330" height="96" rx="12" fill="#ffffff" stroke="#1E7D33" stroke-width="2.5"/><text x="104" y="478" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="16" letter-spacing="2" font-weight="600" fill="#1E7D33">DAILY</text><text x="104" y="512" font-family="Helvetica,Arial,sans-serif" font-size="25" font-weight="700" fill="#1A1C1E">Average ≤ ELV</text><text x="428" y="500" font-family="Helvetica,Arial,sans-serif" font-size="34" font-weight="700" fill="#1E7D33">+</text><rect x="490" y="440" width="360" height="96" rx="12" fill="#E9F6EC" stroke="#1E7D33" stroke-width="2.5"/><text x="514" y="478" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="16" letter-spacing="2" font-weight="600" fill="#1E7D33">HALF-HOURLY</text><text x="514" y="512" font-family="Helvetica,Arial,sans-serif" font-size="25" font-weight="700" fill="#1A1C1E">≤2× ELV</text><line x1="80" y1="576" x2="1120" y2="576" stroke="#E3E5E6" stroke-width="1.5"/><text x="80" y="608" font-family="Helvetica,Arial,sans-serif" font-siz