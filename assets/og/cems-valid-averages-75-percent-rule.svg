<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Mesra Alam Sekitar — Valid averages and the 75% rule"><rect width="1200" height="630" fill="#ffffff"/><rect x="0" y="0" width="1200" height="10" fill="#2CB34A"/><text x="80" y="112" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="22" letter-spacing="4" font-weight="600" fill="#1E7D33">CEMS INSIGHTS · ENFORCING · PART 2</text><text x="80" y="192" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">Valid averages</text><text x="80" y="262" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">and the 75% rule</text><text x="80" y="312" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="400" fill="#3c4247">When a reading counts toward compliance — and when it doesn't.</text><text x="80" y="522" font-family="Helvetica,Arial,sans-serif" font-size="82" font-weight="800" fill="#1E7D33" letter-spacing="-2">75%</text><text x="230" y="522" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="400" fill="#3c4247">of a period must be valid data</text><line x1="80" y1="576" x2="1120" y2="576" stroke="#E3E5E6" stroke-width="1.5"/><text x="80" y="608" font-family="Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#1A1C1E">MESRA <tspan font-weight="400" fill="#5F6062">Alam Sekitar</tspan></text><text x="1120" y="608" text-anchor="end" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="18" letter-spacing="2" font-weight="600" fill="#1E7D33">CLEAN. COMPLIANT. CONNECTED.</text></svg>