<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Mesra Alam Sekitar — Which changes trigger a fresh QAL2"><rect width="1200" height="630" fill="#ffffff"/><rect x="0" y="0" width="1200" height="10" fill="#2CB34A"/><text x="80" y="112" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="22" letter-spacing="4" font-weight="600" fill="#1E7D33">CEMS INSIGHTS · OPERATING · PART 3</text><text x="80" y="192" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">Which changes trigger</text><text x="80" y="262" font-family="Helvetica,Arial,sans-serif" font-size="60" font-weight="800" fill="#1A1C1E" letter-spacing="-1">a fresh QAL2</text><text x="80" y="312" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="400" fill="#3c4247">And the three-month clock that starts when they do.</text><circle cx="98" cy="452" r="15" fill="#E9F6EC" stroke="#1E7D33" stroke-width="2"/><text x="98" y="458" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1E7D33">&#10003;</text><text x="128" y="458" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="700" fill="#1A1C1E">Significant fuel change</text><circle cx="98" cy="492" r="15" fill="#E9F6EC" stroke="#1E7D33" stroke-width="2"/><text x="98" y="498" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1E7D33">&#10003;</text><text x="128" y="498" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="700" fill="#1A1C1E">Plant or process modification</text><circle cx="98" cy="532" r="15" fill="#E9F6EC" stroke="#1E7D33" stroke-width="2"/><text x="98" y="538" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1E7D33">&#10003;</text><text x="128" y="538" font-family="Helvetica,Arial,sans-serif" font-size="27" font-weight="700" fill="#1A1C1E">Operating outside the valid range</text><line x1="80" y1="576" x2="1120" y2="576" stroke="#E3E5E6" stroke-width="1.5"/><text x="80" y="608" font-family="Helvetica,Arial,sans-serif" font-size="24" font-weight="800" fill="#1A1C1E">MESRA <tspan font-weight="400" fill="#5F6062">Alam Sekitar</tspan></text><text x="1120" y="608" text-anchor="end" font-family="'Roboto Mono',ui-monospace,Menlo,monospace" font-size="18" letter-spacing="2" font-weight="600" fill="#1E7D33">CLEAN. COMPLIANT. CONNECTED.</text></svg>